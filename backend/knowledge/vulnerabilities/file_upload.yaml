id: file_upload

name: Insecure File Upload

description: >
  Insecure File Upload vulnerabilities occur when an application
  improperly validates, stores or processes user-uploaded files.
  Attackers may exploit weak validation to upload malicious files,
  overwrite existing files, execute server-side code, bypass security
  controls or gain unauthorized access to application resources.

version: 1.0

category: file_handling

severity: critical

confidence: high

owasp:

  top10:
    - A01:2021 Broken Access Control
    - A05:2021 Security Misconfiguration

  wstg:
    - WSTG-BUSL

cwe:

  - CWE-434

cvss:

  base_score: 9.1

tags:

  - file_upload
  - unrestricted_upload
  - unrestricted_file_upload
  - arbitrary_file_upload
  - file_handling
  - validation
  - upload
  - storage

affected_assets:

  - File Upload Endpoints
  - Image Upload Services
  - Document Upload Services
  - Profile Picture Uploads
  - Media Libraries
  - File Storage Systems
  - Content Management Systems
  - Object Storage Services

attack_vectors:

  - Extension Validation Bypass
  - MIME Type Bypass
  - Magic Byte Bypass
  - Double Extension
  - Polyglot Files
  - Null Byte Injection
  - Filename Manipulation
  - Path Traversal
  - Directory Traversal
  - File Overwrite
  - Executable Upload
  - SVG Upload
  - Archive Upload
  - Client-side Validation Bypass
  - Server-side Validation Bypass

impact:

  - Remote Code Execution
  - Arbitrary File Upload
  - Sensitive File Disclosure
  - File Overwrite
  - Stored Cross-Site Scripting
  - Malware Distribution
  - Server Compromise
  - Denial of Service

prerequisites:

  - User-controlled file upload functionality

notes:

  - Uploaded files should always be validated on the server.
  - Client-side validation should never be trusted.
  - File uploads should be stored outside the web root whenever possible.
  - File names should be generated by the server.
  - File extension, MIME type and file signature should all be validated.