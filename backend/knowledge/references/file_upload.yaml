notes:

  - Never trust client-supplied file extensions, MIME types or filenames.

  - Validate uploaded files using multiple layers of verification including extension, MIME type and file signature.

  - Store uploaded files outside the web root whenever possible.

  - Generate server-side filenames instead of using user-supplied filenames.

  - Apply authorization checks to every upload and download operation.

  - Consider antivirus scanning and Content Disarm & Reconstruction (CDR) for high-risk file types.