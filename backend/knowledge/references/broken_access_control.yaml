version: 1.0

resources:

  learning:

    - source: PortSwigger Web Security Academy
      title: Access Control Vulnerabilities
      type: lab

    - source: OWASP Web Security Testing Guide
      title: Testing for Authorization (WSTG-ATHZ)
      type: testing_guide

  standards:

    - source: OWASP Top 10
      title: A01:2021 - Broken Access Control
      type: standard

    - source: OWASP ASVS
      title: V4 - Access Control Verification Requirements
      type: verification_standard

    - source: CWE
      title: CWE-284 - Improper Access Control
      type: weakness

  books:

    - source: The Web Application Hacker's Handbook
      title: Access Control Vulnerabilities
      authors:
        - Dafydd Stuttard
        - Marcus Pinto

    - source: Real-World Bug Hunting
      title: Access Control & Authorization Vulnerabilities
