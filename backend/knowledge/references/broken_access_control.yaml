        - Peter Yaworski

  methodology:

    - source: OWASP ASVS
      title: V4 Access Control Requirements

    - source: OWASP Cheat Sheet Series
      title: Authorization Cheat Sheet

notes:

  - Broken Access Control is the #1 risk in the OWASP Top 10 (2021).
  - Authorization decisions should always be enforced on the server.
  - Client-side role checks and hidden UI elements are not security controls.
  - Every privileged action should perform an authorization check before execution.